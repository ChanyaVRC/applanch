site_name: applanch Docs
site_description: Documentation for applanch
site_url: https://chanyavrc.github.io/applanch/
repo_url: https://github.com/ChanyaVRC/applanch
repo_name: ChanyaVRC/applanch
edit_uri: edit/master/docs/

theme:
  name: material
  language: en
  favicon: assets/images/applanch-badged.ico
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            User Guide: ユーザーガイド
            Getting Started: クイックスタート
            Items & Categories: アイテムとカテゴリー
            Settings Reference: 設定リファレンス
            Themes: テーマ
            Theme JSON Format: テーマ JSON 形式
            Launch Fallbacks: 起動フォールバック
            Windows Integration: Windows 統合
            Updates: 自動更新
            Install Guide: インストールガイド
            Developer Guide: 開発者ガイド
            Contributing: コントリビューション
            Release Guide: リリースガイド

extra:
  alternate:
    - name: English
      link: /applanch/
      lang: en
    - name: 日本語
      link: /applanch/ja/
      lang: ja

extra_css:
  - assets/stylesheets/language-switcher.css

extra_javascript:
  - assets/javascripts/language-switcher-label.js

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
    - Install Guide: install.md
    - Getting Started: user/getting-started.md
    - Items & Categories: user/items.md
    - Settings Reference: user/settings.md
    - Themes:
      - user/themes.md
      - Theme JSON Format: user/theme-format.md
    - Launch Fallbacks: user/launch-fallbacks.md
    - Windows Integration: user/windows-integration.md
    - Updates: user/updates.md
  - Developer Guide:
    - Contributing: dev/contributing.md
    - Release Guide: dev/release.md
