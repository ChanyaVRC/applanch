site_name: applanch Docs
site_description: Documentation for applanch
site_url: https://chanyavrc.github.io/applanch/
repo_url: https://github.com/ChanyaVRC/applanch
repo_name: ChanyaVRC/applanch
edit_uri: edit/master/docs/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - English:
    - Home: index.md
    - Install Guide: install.md
    - Release Guide: release.md
  - 日本語:
    - ホーム: index.ja.md
    - インストールガイド: install.ja.md
    - リリースガイド: release.ja.md
