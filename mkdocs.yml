site_name: applanch Docs
site_description: Documentation for applanch
site_url: https://chanyavrc.github.io/applanch/
repo_url: https://github.com/ChanyaVRC/applanch
repo_name: ChanyaVRC/applanch
edit_uri: edit/master/docs/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - English:
    - Home: index.md
    - User Guide:
      - Getting Started: user/getting-started.md
      - Items & Categories: user/items.md
      - Settings Reference: user/settings.md
      - Themes: user/themes.md
      - Launch Fallbacks: user/launch-fallbacks.md
    - Install Guide: install.md
    - Release Guide: release.md
    - Developer Guide:
      - Contributing: dev/contributing.md
  - 日本語:
    - ホーム: index.ja.md
    - ユーザーガイド:
      - クイックスタート: user/getting-started.ja.md
      - アイテムとカテゴリー: user/items.ja.md
      - 設定リファレンス: user/settings.ja.md
      - テーマ: user/themes.ja.md
      - 起動フォールバック: user/launch-fallbacks.ja.md
    - インストールガイド: install.ja.md
    - リリースガイド: release.ja.md
    - 開発者ガイド:
      - コントリビューション: dev/contributing.ja.md
