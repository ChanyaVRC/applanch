name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore applanch.slnx

      - name: Build
        run: dotnet build applanch.slnx --configuration Release --no-restore

      - name: Upload prepared workspace
        uses: actions/upload-artifact@v4
        with:
          name: prepared-workspace
          path: |
            src/**/obj/**
            src/**/bin/**
            tests/**/obj/**
            tests/**/bin/**
          retention-days: 1
          if-no-files-found: error

  format:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-workspace
          path: .

      - name: Check formatting
        run: dotnet format applanch.slnx --verify-no-changes --no-restore --verbosity minimal

  vulnerable-packages:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-workspace
          path: .

      - name: Check vulnerable packages
        run: dotnet list applanch.slnx package --vulnerable --include-transitive --no-restore

  test:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-workspace
          path: .

      - name: Test
        run: dotnet test tests/applanch.Tests/applanch.Tests.csproj --configuration Release --no-build --no-restore --results-directory TestResults --logger "trx;LogFileName=test-results.trx" --collect "XPlat Code Coverage;Format=cobertura"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

  sparse-package:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sparse MSIX package
        shell: pwsh
        run: ./scripts/build-sparse-package.ps1 -OutputMsix artifacts/sparse-package/applanch.msix

      - name: Upload sparse package
        uses: actions/upload-artifact@v4
        with:
          name: sparse-package
          path: artifacts/sparse-package/applanch.msix
          if-no-files-found: error
