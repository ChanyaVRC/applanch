name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore applanch.slnx

      - name: Check formatting
        run: dotnet format applanch.slnx --verify-no-changes --no-restore --verbosity minimal

      - name: Check vulnerable packages
        run: dotnet list applanch.slnx package --vulnerable --include-transitive

      - name: Build
        run: dotnet build applanch.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/applanch.Tests/applanch.Tests.csproj --configuration Release --no-build --results-directory TestResults --logger "trx;LogFileName=test-results.trx" --collect "XPlat Code Coverage;Format=cobertura"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
